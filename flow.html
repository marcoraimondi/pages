<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Flow — Accesso</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#08080f;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;padding:24px}
.box{width:100%;max-width:340px;text-align:center}
.logo{font-size:1.15rem;font-weight:800;letter-spacing:-.03em;color:#f5f5f7;margin-bottom:6px}
.logo span{color:rgba(255,255,255,.35)}
.sub{font-size:.82rem;color:rgba(255,255,255,.4);margin-bottom:32px}
.field{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:14px 18px;font-size:.95rem;color:#f5f5f7;font-family:inherit;outline:none;text-align:center;transition:border-color .2s}
.field:focus{border-color:rgba(10,132,255,.5)}
.field.shake{animation:shake .35s ease}
.btn{margin-top:12px;width:100%;background:#f5f5f7;color:#08080f;border:none;border-radius:14px;padding:14px;font-size:.92rem;font-weight:700;font-family:inherit;cursor:pointer;transition:.15s}
.btn:hover{opacity:.85}
.err{margin-top:10px;font-size:.78rem;color:rgba(255,69,58,.85);min-height:18px}
.spinner{display:none;margin:14px auto 0;width:20px;height:20px;border:2px solid rgba(255,255,255,.15);border-top-color:#f5f5f7;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
</style>
</head>
<body>
<div class="box">
  <p class="logo">Flow <span>by Fastweb</span></p>
  <p class="sub">Inserisci la password per continuare</p>
  <input id="f" class="field" type="password" placeholder="Password" autocomplete="current-password">
  <button class="btn" onclick="unlock()">Accedi</button>
  <div class="spinner" id="sp"></div>
  <p class="err" id="err"></p>
</div>

function b64dec(s){const b=atob(s);const a=new Uint8Array(b.length);for(let i=0;i<b.length;i++)a[i]=b.charCodeAt(i);return a}
async function unlock(){
  const pw=document.getElementById('f').value;
  if(!pw)return;
  document.getElementById('sp').style.display='block';
  document.querySelector('.btn').disabled=true;
  document.getElementById('err').textContent='';
  try{
    const raw=b64dec(PAYLOAD);
    const salt=raw.slice(0,16);const iv=raw.slice(16,28);const tag=raw.slice(28,44);const ct=raw.slice(44);
    const ctWithTag=new Uint8Array(ct.length+tag.length);ctWithTag.set(ct);ctWithTag.set(tag,ct.length);
    const keyMat=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
    const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:150000,hash:'SHA-256'},keyMat,{name:'AES-GCM',length:256},false,['decrypt']);
    const plain=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,ctWithTag);
    const html=new TextDecoder().decode(plain);
    document.open();document.write(html);document.close();
  }catch(e){
    document.getElementById('sp').style.display='none';
    document.querySelector('.btn').disabled=false;
    const f=document.getElementById('f');
    document.getElementById('err').textContent='Password non corretta.';
    f.classList.remove('shake');void f.offsetWidth;f.classList.add('shake');f.value='';f.focus();
  }
}
document.getElementById('f').addEventListener('keydown',e=>{if(e.key==='Enter')unlock();document.getElementById('err').textContent='';});
