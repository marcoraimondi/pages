<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Piano SIM</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0e;font-family:-apple-system,'Segoe UI',Arial,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
  #gate{display:flex;flex-direction:column;align-items:center;gap:20px;padding:40px 32px;background:#141414;border:1px solid #222;border-radius:24px;width:min(340px,calc(100vw - 32px));animation:fi .45s ease forwards}
  @keyframes fi{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  #gate svg{opacity:.6}
  #gate h2{font-size:14px;font-weight:700;color:#ddd;letter-spacing:-.2px}
  #gate p{font-size:11px;color:#444;text-align:center}
  #pwd{width:100%;padding:11px 14px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;color:#e0e0e0;font-size:13px;outline:none;transition:border-color .2s}
  #pwd:focus{border-color:#444}
  #btn{width:100%;padding:11px;background:#f0c040;border:none;border-radius:12px;font-size:13px;font-weight:700;color:#111;cursor:pointer;transition:opacity .15s}
  #btn:hover{opacity:.88}
  #err{font-size:11px;color:#e05050;min-height:14px;text-align:center}
</style>
</head>
<body>
<div id="gate">
  <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
    <rect x="5" y="11" width="14" height="10" rx="3" stroke="#888" stroke-width="1.6"/>
    <path d="M8 11V7a4 4 0 0 1 8 0v4" stroke="#888" stroke-width="1.6" stroke-linecap="round"/>
    <circle cx="12" cy="16" r="1.5" fill="#888"/>
  </svg>
  <h2>Contenuto protetto</h2>
  <p>Inserisci la password per accedere</p>
  <input id="pwd" type="password" placeholder="Password" autofocus/>
  <button id="btn">Accedi</button>
  <div id="err"></div>
</div>

async function unlock(pwd){
  const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pwd),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(SALT),iterations:100000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
  return new TextDecoder().decode(await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(IV)},key,b64(CT)));
}
async function go(){
  const pwd=document.getElementById('pwd').value.trim(),err=document.getElementById('err'),btn=document.getElementById('btn');
  if(!pwd){err.textContent='Inserisci la password';return}
  btn.textContent='Verifica…';btn.disabled=true;err.textContent='';
  try{const h=await unlock(pwd);document.open();document.write(h);document.close()}
  catch(e){err.textContent='Password errata';btn.textContent='Accedi';btn.disabled=false;document.getElementById('pwd').focus()}
}
document.getElementById('btn').addEventListener('click',go);
document.getElementById('pwd').addEventListener('keydown',e=>{if(e.key==='Enter')go()});
