<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>robotOS</title><style>*{margin:0;padding:0;box-sizing:border-box}body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#EFF6FF;font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;transition:background .3s}.box{text-align:center;padding:48px 40px;background:#fff;border-radius:24px;box-shadow:0 4px 40px rgba(59,130,246,.12);max-width:360px;width:90%;position:relative}.logo{font-size:2rem;font-weight:800;color:#3B82F6;letter-spacing:-.02em;margin-bottom:6px;cursor:pointer;user-select:none;display:inline-block;transition:color .3s}.sub{font-size:.9rem;color:#1D4ED8;margin-bottom:32px;transition:color .3s}input{width:100%;padding:14px 18px;border:1.5px solid #DBEAFE;border-radius:12px;font-size:1rem;outline:none;transition:border-color .2s;font-family:inherit;text-align:center;letter-spacing:.1em}input:focus{border-color:#3B82F6}button{margin-top:14px;width:100%;padding:14px;background:#3B82F6;color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer;transition:background .3s;font-family:inherit}button:hover{opacity:.88}.err{color:#EF4444;font-size:.85rem;margin-top:10px;min-height:20px}.spin{display:none;margin-top:16px;color:#3B82F6;font-size:.9rem}
#palette-menu{position:absolute;top:56px;left:50%;transform:translateX(-50%) translateY(-8px);background:#fff;border:1px solid rgba(0,0,0,.08);border-radius:16px;box-shadow:0 8px 40px rgba(0,0,0,.13);padding:16px;z-index:999;width:220px;opacity:0;pointer-events:none;transition:opacity .2s ease,transform .2s ease;text-align:left}#palette-menu.visible{opacity:1;pointer-events:all;transform:translateX(-50%) translateY(0)}.pm-title{font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#999;margin-bottom:10px}.pm-swatch,.nm-swatch{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:10px;cursor:pointer;transition:background .15s;margin-bottom:4px}.pm-swatch:last-child,.nm-swatch:last-child{margin-bottom:0}.pm-swatch:hover,.nm-swatch:hover{background:#f5f5f5}.pm-swatch.active,.nm-swatch.active{background:#f0f0f0}.pm-dots{display:flex;gap:4px}.pm-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0}.pm-label,.nm-label{font-size:.85rem;font-weight:600;color:#333}.nm-icon{width:42px;font-size:.68rem;font-weight:800;color:#aaa;letter-spacing:-.01em;flex-shrink:0;font-family:-apple-system,'Inter',monospace}.pm-check,.nm-check{margin-left:auto;font-size:.75rem;color:#555;opacity:0}.pm-swatch.active .pm-check,.nm-swatch.active .nm-check{opacity:1}.pm-divider{border:none;border-top:1px solid #eee;margin:8px 0}
/* dark-mode toggle row */.dm-row{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:10px;cursor:pointer;transition:background .15s;user-select:none;margin-bottom:0}.dm-row:hover{background:#f5f5f5}.dm-row-icon{font-size:.9rem;flex-shrink:0;width:22px;text-align:center}.dm-sw-track{width:34px;height:18px;background:#ddd;border-radius:9px;position:relative;transition:background .25s;flex-shrink:0;margin-left:auto}.dm-sw-thumb{width:14px;height:14px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:transform .25s;box-shadow:0 1px 3px rgba(0,0,0,.25)}.dm-sw-track.on{background:#555}.dm-sw-track.on .dm-sw-thumb{transform:translateX(16px)}/* dark mode overrides */body.dark{background:#111!important}body.dark .box{background:#1c1c1e!important;box-shadow:0 4px 40px rgba(0,0,0,.5)!important}body.dark .sub{color:#7a8ba8!important}body.dark input{background:#2c2c2e!important;border-color:#3a3a3c!important;color:#f0f0f0!important}body.dark input::placeholder{color:#666}body.dark #palette-menu{background:#2c2c2e;border-color:rgba(255,255,255,.09)}body.dark .pm-swatch:hover,body.dark .nm-swatch:hover{background:#3a3a3c}body.dark .pm-swatch.active,body.dark .nm-swatch.active{background:#3a3a3c}body.dark .dm-row:hover{background:#3a3a3c}body.dark .pm-label,body.dark .nm-label{color:#e0e0e0}body.dark .pm-title{color:#666}body.dark .pm-divider{border-color:#3a3a3c}body.dark .pm-check,body.dark .nm-check{color:#aaa}body.dark .nm-icon{color:#666}body.dark .dm-sw-track{background:#444}body.dark .dm-sw-track.on{background:#777}</style></head><body>
<div class="box">
  <div class="logo" id="logo-trigger"><span id="bot-name-lbl">robotOS</span></div>
  <div id="palette-menu">
    <div class="pm-title">Nome</div>
    <div class="nm-swatch active" data-name="robotOS"><span class="nm-icon">rOS</span><span class="nm-label">robotOS</span><span class="nm-check">✓</span></div>
    <div class="nm-swatch" data-name="R.O.S."><span class="nm-icon">ROS</span><span class="nm-label">R.O.S.</span><span class="nm-check">✓</span></div>
    <div class="nm-swatch" data-name="Ross"><span class="nm-icon">Rss</span><span class="nm-label">Ross</span><span class="nm-check">✓</span></div>
    <div class="nm-swatch" data-name="R.O.S.S."><span class="nm-icon">RSS</span><span class="nm-label">R.O.S.S.</span><span class="nm-check">✓</span></div>
    <hr class="pm-divider">
    <div class="pm-title">Palette</div>
    <div class="pm-swatch" data-palette="neon"><div class="pm-dots"><div class="pm-dot" style="background:#00D36C"></div><div class="pm-dot" style="background:#009950"></div><div class="pm-dot" style="background:#001A0D"></div></div><span class="pm-label">Neon</span><span class="pm-check">✓</span></div>
    <div class="pm-swatch active" data-palette="titanio"><div class="pm-dots"><div class="pm-dot" style="background:#3B82F6"></div><div class="pm-dot" style="background:#1D4ED8"></div><div class="pm-dot" style="background:#0A1628"></div></div><span class="pm-label">Titanio</span><span class="pm-check">✓</span></div>
    <div class="pm-swatch" data-palette="plasma"><div class="pm-dots"><div class="pm-dot" style="background:#A855F7"></div><div class="pm-dot" style="background:#7C3AED"></div><div class="pm-dot" style="background:#1A0533"></div></div><span class="pm-label">Plasma</span><span class="pm-check">✓</span></div>
    <div class="pm-swatch" data-palette="carbonio"><div class="pm-dots"><div class="pm-dot" style="background:#6B7280"></div><div class="pm-dot" style="background:#374151"></div><div class="pm-dot" style="background:#111827"></div></div><span class="pm-label">Carbonio</span><span class="pm-check">✓</span></div>
    <div class="pm-swatch" data-palette="infrarosso"><div class="pm-dots"><div class="pm-dot" style="background:#EF4444"></div><div class="pm-dot" style="background:#B91C1C"></div><div class="pm-dot" style="background:#1A0000"></div></div><span class="pm-label">Infrarosso</span><span class="pm-check">✓</span></div>
    <hr class="pm-divider">
    <div class="pm-title">Tema</div>

<script>
const palettes={neon:{rust:'#00D36C',brown:'#009950',espresso:'#001A0D',cream:'#F0FFF8',light:'#CCFAE8'},titanio:{rust:'#3B82F6',brown:'#1D4ED8',espresso:'#0A1628',cream:'#EFF6FF',light:'#DBEAFE'},plasma:{rust:'#A855F7',brown:'#7C3AED',espresso:'#1A0533',cream:'#FAF5FF',light:'#EDE9FE'},carbonio:{rust:'#6B7280',brown:'#374151',espresso:'#111827',cream:'#F9FAFB',light:'#F3F4F6'},infrarosso:{rust:'#EF4444',brown:'#B91C1C',espresso:'#1A0000',cream:'#FFF5F5',light:'#FEE2E2'}};

function applyPaletteLogin(key){
  const p=palettes[key]; if(!p) return;
  const isDark=document.body.classList.contains('dark');
  if(!isDark){document.body.style.background=p.cream;document.querySelector('.sub').style.color=p.brown;document.querySelector('input').style.borderColor=p.light;}
  document.querySelector('.logo').style.color=p.rust;
  document.querySelector('#login-btn').style.background=p.rust;
  localStorage.setItem('botPalette',key);
  document.querySelectorAll('.pm-swatch').forEach(s=>s.classList.toggle('active',s.dataset.palette===key));
}
function applyDark(on){
  const p=palettes[localStorage.getItem('botPalette')||'titanio']||palettes.titanio;
  document.body.classList.toggle('dark',on);
  if(on){document.body.style.background='';document.querySelector('.sub').style.color='';document.querySelector('input').style.borderColor='';}
  else{document.body.style.background=p.cream;document.querySelector('.sub').style.color=p.brown;document.querySelector('input').style.borderColor=p.light;}
  const track=document.getElementById('dm-sw-track');
  const icon=document.getElementById('dm-row-icon');
  const label=document.getElementById('dm-row-label');
  if(track)track.classList.toggle('on',on);
  if(icon)icon.textContent=on?'🌙':'☀️';
  if(label)label.textContent=on?'Scuro':'Chiaro';
  localStorage.setItem('botDark',on?'1':'0');
}

function applyNameLogin(name){
  document.getElementById('bot-name-lbl').textContent=name;
  document.title=name;
  localStorage.setItem('botName',name);
  document.querySelectorAll('.nm-swatch').forEach(b=>b.classList.toggle('active',b.dataset.name===name));
}

const menu=document.getElementById('palette-menu');
const logo=document.getElementById('logo-trigger');
logo.addEventListener('click',e=>{e.stopPropagation();menu.classList.toggle('visible');});
document.addEventListener('click',e=>{if(!menu.contains(e.target)&&!logo.contains(e.target))menu.classList.remove('visible');});
document.querySelectorAll('.pm-swatch').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();applyPaletteLogin(el.dataset.palette);setTimeout(()=>menu.classList.remove('visible'),200);}));
document.querySelectorAll('.nm-swatch').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();applyNameLogin(el.dataset.name);setTimeout(()=>menu.classList.remove('visible'),200);}));

applyDark(localStorage.getItem('botDark')==='1');
applyPaletteLogin(localStorage.getItem('botPalette')||'titanio');
applyNameLogin(localStorage.getItem('botName')||'robotOS');
document.getElementById('dm-row').addEventListener('click',function(e){e.stopPropagation();applyDark(!document.body.classList.contains('dark'));});

document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')unlock();});
document.getElementById('login-btn').addEventListener('click',unlock);
function unlock(){
  const pw=document.getElementById('pw').value;
  document.getElementById('err').textContent='';
  document.getElementById('spin').style.display='block';
  setTimeout(()=>{
    try{
      let dec=CryptoJS.AES.decrypt(CT,pw).toString(CryptoJS.enc.Utf8);
      if(!dec||dec.indexOf('<!DOCTYPE')<0&&dec.indexOf('<html')<0)throw new Error();
      // Inject saved palette + name into the inner page before writing
      const sp=localStorage.getItem('botPalette')||'titanio';
      const sn=localStorage.getItem('botName')||'robotOS';
      const p=palettes[sp]||palettes.titanio;
      const sd=localStorage.getItem('botDark')==='1';
      const darkCss=sd?'.dm-row:hover{background:#3a3a3c}.dm-sw-track{background:#444!important}.dm-sw-track.on{background:#777!important}body.dark .pm-label,body.dark .nm-label{color:#e0e0e0}body.dark .pm-title{color:#666}body.dark .pm-divider{border-color:#3a3a3c}body.dark .pm-check,body.dark .nm-check{color:#aaa}body.dark .nm-icon{color:#666}'+'body{background:#111!important}.box{background:#1c1c1e!important;box-shadow:0 4px 40px rgba(0,0,0,.5)!important}.sub{color:#7a8ba8!important}input{background:#2c2c2e!important;border-color:#3a3a3c!important;color:#f0f0f0!important}input::placeholder{color:#666}#palette-menu{background:#2c2c2e!important;border-color:rgba(255,255,255,.09)!important}.pm-swatch:hover,.nm-swatch:hover{background:#3a3a3c}.pm-swatch.active,.nm-swatch.active{background:#3a3a3c}':'';
      const baseDmCss='.dm-row{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:10px;cursor:pointer;transition:background .15s;user-select:none}'+'.dm-row:hover{background:rgba(0,0,0,.04)}'+'.dm-row-icon{font-size:.9rem;flex-shrink:0;width:22px;text-align:center}'+'.dm-sw-track{width:34px;height:18px;background:#ddd;border-radius:9px;position:relative;transition:background .25s;flex-shrink:0;margin-left:auto}'+'.dm-sw-thumb{width:14px;height:14px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:transform .25s;box-shadow:0 1px 3px rgba(0,0,0,.25)}'+'.dm-sw-track.on{background:#555}'+'.dm-sw-track.on .dm-sw-thumb{transform:translateX(16px)}';
      const injectStyle='<style id="init-palette">:root{--rust:'+p.rust+';--brown:'+p.brown+';--espresso:'+p.espresso+';--cream:'+p.cream+';--light:'+p.light+'}'+baseDmCss+darkCss+'</style>';
      const injectScript='<scr'+'ipt>'
        +'window.__IP__="'+sp+'";window.__IN__="'+sn+'";window.BOT_NAME="'+sn+'";window.__DK__='+(sd?'true':'false')+';'
        +'function __applyDark__(on){'
        +  'document.body.classList.toggle("dark",on);'
        +  'var r=document.getElementById("dm-sw-track");'
        +  'var i=document.getElementById("dm-row-icon");'
        +  'var l=document.getElementById("dm-row-label");'
        +  'if(r)r.classList.toggle("on",on);'
        +  'if(i)i.textContent=on?"🌙":"☀️";'
        +  'if(l)l.textContent=on?"Scuro":"Chiaro";'
        +  'localStorage.setItem("botDark",on?"1":"0");'
        +'}'
        +'document.addEventListener("DOMContentLoaded",function(){'
        +  'var pm=document.getElementById("palette-menu");'
        +  'if(pm&&!document.getElementById("dm-row")){'
        +    'var hr=document.createElement("hr");hr.className="pm-divider";pm.appendChild(hr);'
        +    'var tt=document.createElement("div");tt.className="pm-title";tt.textContent="Tema";pm.appendChild(tt);'
        +    'var row=document.createElement("div");row.id="dm-row";row.className="dm-row";'
        +    'row.innerHTML="<span class=dm-row-icon id=dm-row-icon>☀️</span><span class=pm-label id=dm-row-label>Chiaro</span><div class=dm-sw-track id=dm-sw-track><div class=dm-sw-thumb></div></div>";'
        +    'pm.appendChild(row);'
        +    'row.addEventListener("click",function(e){e.stopPropagation();__applyDark__(!document.body.classList.contains("dark"));});'
        +  '}'
        +  '__applyDark__(window.__DK__);'
        +'});'
        +'</'+'script>';
      dec=dec.replace('</head>',injectStyle+injectScript+'</head>');
      document.open();document.write(dec);document.close();
    }catch(e){
      document.getElementById('spin').style.display='none';
      document.getElementById('err').textContent='Password errata. Riprova.';
      document.getElementById('pw').value='';
      document.getElementById('pw').focus();
    }
  },80);
}
</script></body></html>
