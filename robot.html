<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Ross</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"><style>:root{--rust:#3B82F6;--brown:#1D4ED8;--espresso:#0A1628;--cream:#EFF6FF;--light:#DBEAFE;--on-rust:#ffffff}*{margin:0;padding:0;box-sizing:border-box}body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--cream);font-family:'Space Grotesk',sans-serif;transition:background .3s}.box{text-align:center;padding:48px 40px;background:#fff;border-radius:24px;box-shadow:0 4px 40px rgba(59,130,246,.12);max-width:360px;width:90%;position:relative}.logo{font-size:2rem;font-weight:800;color:var(--rust);letter-spacing:-.02em;margin-bottom:6px;cursor:pointer;user-select:none;display:inline-block;transition:color .3s}.sub{font-size:.9rem;color:var(--brown);margin-bottom:32px;transition:color .3s}input{width:100%;padding:14px 18px;border:1.5px solid var(--light);border-radius:12px;font-size:1rem;outline:none;transition:border-color .2s;font-family:inherit;text-align:center;letter-spacing:.1em}input:focus{border-color:var(--rust)}button{margin-top:14px;width:100%;padding:14px;background:var(--rust);color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer;transition:background .3s;font-family:inherit}button:hover{opacity:.88}.err{color:#EF4444;font-size:.85rem;margin-top:10px;min-height:20px}.spin{display:none;margin-top:16px;color:var(--rust);font-size:.9rem}
#palette-menu{position:absolute;top:56px;left:50%;transform:translateX(-50%) translateY(-8px);background:#fff;border:1px solid rgba(0,0,0,.08);border-radius:16px;box-shadow:0 8px 40px rgba(0,0,0,.13);padding:16px;z-index:999;width:220px;opacity:0;pointer-events:none;transition:opacity .2s ease,transform .2s ease;text-align:left}#palette-menu.visible{opacity:1;pointer-events:all;transform:translateX(-50%) translateY(0)}.pm-title{font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#999;margin-bottom:10px}.pm-swatch,.nm-swatch{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:10px;cursor:pointer;transition:background .15s;margin-bottom:4px}.pm-swatch:last-child,.nm-swatch:last-child{margin-bottom:0}.pm-swatch:hover,.nm-swatch:hover{background:#f5f5f5}.pm-swatch.active,.nm-swatch.active{background:#f0f0f0}.pm-dots{display:flex;gap:4px}.pm-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0}.pm-label,.nm-label{font-size:.85rem;font-weight:600;color:#333}.nm-icon{width:42px;font-size:.68rem;font-weight:800;color:#aaa;letter-spacing:-.01em;flex-shrink:0;font-family:'Space Grotesk',sans-serif}.pm-check,.nm-check{margin-left:auto;font-size:.75rem;color:#555;opacity:0}.pm-swatch.active .pm-check,.nm-swatch.active .nm-check{opacity:1}.pm-divider{border:none;border-top:1px solid #eee;margin:8px 0}
/* dark-mode toggle row */.dm-row{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:10px;cursor:pointer;transition:background .15s;user-select:none;margin-bottom:0}.dm-row:hover{background:#f5f5f5}.dm-row-icon{font-size:.9rem;flex-shrink:0;width:22px;text-align:center}.dm-sw-track{width:34px;height:18px;background:#ddd;border-radius:9px;position:relative;transition:background .25s;flex-shrink:0;margin-left:auto}.dm-sw-thumb{width:14px;height:14px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:transform .25s;box-shadow:0 1px 3px rgba(0,0,0,.25)}.dm-sw-track.on{background:#555}.dm-sw-track.on .dm-sw-thumb{transform:translateX(16px)}/* dark mode overrides */body.dark{background:#111!important}body.dark .box{background:#1c1c1e!important;box-shadow:0 4px 40px rgba(0,0,0,.5)!important}body.dark .sub{color:#7a8ba8!important}body.dark input{background:#2c2c2e!important;border-color:#3a3a3c!important;color:#f0f0f0!important}body.dark input::placeholder{color:#666}body.dark #palette-menu{background:#2c2c2e;border-color:rgba(255,255,255,.09)}body.dark .pm-swatch:hover,body.dark .nm-swatch:hover{background:#3a3a3c}body.dark .pm-swatch.active,body.dark .nm-swatch.active{background:#3a3a3c}body.dark .dm-row:hover{background:#3a3a3c}body.dark .pm-label,body.dark .nm-label{color:#e0e0e0}body.dark .pm-title{color:#666}body.dark .pm-divider{border-color:#3a3a3c}body.dark .pm-check,body.dark .nm-check{color:#aaa}body.dark .nm-icon{color:#666}body.dark .dm-sw-track{background:#444}body.dark .dm-sw-track.on{background:#777}</style></head><body>
<div class="box">
  <div class="logo" id="logo-trigger"><span id="bot-name-lbl">Ross</span></div>
  <div id="palette-menu">
    <div class="pm-title">Palette</div>
    <div class="pm-swatch active" data-palette="giallo_grafite"><div class="pm-dots"><div class="pm-dot" style="background:#FDC400"></div><div class="pm-dot" style="background:#B38B00"></div><div class="pm-dot" style="background:#1E1B2E"></div></div><span class="pm-label">Giallo Grafite</span><span class="pm-check">✓</span></div>
    <div class="pm-swatch" data-palette="titanio"><div class="pm-dots"><div class="pm-dot" style="background:#3B82F6"></div><div class="pm-dot" style="background:#1D4ED8"></div><div class="pm-dot" style="background:#EFF6FF"></div></div><span class="pm-label">Titanio</span><span class="pm-check">✓</span></div>
    <div class="pm-swatch" data-palette="viola_lavanda"><div class="pm-dots"><div class="pm-dot" style="background:#A855F7"></div><div class="pm-dot" style="background:#7C3AED"></div><div class="pm-dot" style="background:#FAF5FF"></div></div><span class="pm-label">Viola Lavanda</span><span class="pm-check">✓</span></div>
    <div class="pm-swatch" data-palette="ciano_cielo"><div class="pm-dots"><div class="pm-dot" style="background:#0891B2"></div><div class="pm-dot" style="background:#0E7490"></div><div class="pm-dot" style="background:#ECFEFF"></div></div><span class="pm-label">Ciano Cielo</span><span class="pm-check">✓</span></div>
    <hr class="pm-divider">
    <div class="pm-title">Tema</div>
    <div class="dm-row" id="dm-row"><span class="dm-row-icon" id="dm-row-icon">☀️</span><span class="pm-label" id="dm-row-label">Chiaro</span><div class="dm-sw-track" id="dm-sw-track"><div class="dm-sw-thumb"></div></div></div>
  </div>
  <div class="sub">Contenuto protetto — inserisci la password</div>
  <input type="password" id="pw" placeholder="Password" autofocus>
  <button id="login-btn">Accedi →</button>
  <div class="err" id="err"></div>
  <div class="spin" id="spin">Apertura in corso...</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
<script>
const palettes={
  giallo_grafite:{rust:'#FDC400',brown:'#B38B00',espresso:'#141019',cream:'#1E1B2E',light:'#2A2640',dark:true,onRust:'#141019'},
  titanio:{rust:'#3B82F6',brown:'#1D4ED8',espresso:'#0A1628',cream:'#EFF6FF',light:'#DBEAFE',dark:false,onRust:'#ffffff'},
  viola_lavanda:{rust:'#A855F7',brown:'#7C3AED',espresso:'#1A0533',cream:'#FAF5FF',light:'#EDE9FE',dark:false,onRust:'#ffffff'},
  ciano_cielo:{rust:'#0891B2',brown:'#0E7490',espresso:'#0C4A6E',cream:'#ECFEFF',light:'#CFFAFE',dark:false,onRust:'#ffffff'},
};

function applyPaletteLogin(key){
  const p=palettes[key]; if(!p) return;
  if(typeof p.dark==='boolean') applyDark(p.dark);
  const isDark=document.body.classList.contains('dark');
  if(!isDark){document.body.style.background=p.cream;document.querySelector('.sub').style.color=p.brown;document.querySelector('input').style.borderColor=p.light;}
  const root=document.documentElement;root.style.setProperty('--rust',p.rust);root.style.setProperty('--brown',p.brown);root.style.setProperty('--espresso',p.espresso);root.style.setProperty('--cream',p.cream);root.style.setProperty('--light',p.light);if(p.onRust)root.style.setProperty('--on-rust',p.onRust);document.querySelector('.logo').style.color=p.rust;
  document.querySelector('#login-btn').style.background=p.rust;
  localStorage.setItem('botPalette',key);
  document.querySelectorAll('.pm-swatch').forEach(s=>s.classList.toggle('active',s.dataset.palette===key));
}
function applyDark(on){
  const p=palettes[localStorage.getItem('botPalette')||'giallo_grafite']||palettes.titanio;
  document.body.classList.toggle('dark',on);
  if(on){document.body.style.background='';document.querySelector('.sub').style.color='';document.querySelector('input').style.borderColor='';}
  else{document.body.style.background=p.cream;document.querySelector('.sub').style.color=p.brown;document.querySelector('input').style.borderColor=p.light;}
  const track=document.getElementById('dm-sw-track');
  const icon=document.getElementById('dm-row-icon');
  const label=document.getElementById('dm-row-label');
  if(track)track.classList.toggle('on',on);
  if(icon)icon.textContent=on?'🌙':'☀️';
  if(label)label.textContent=on?'Scuro':'Chiaro';
  localStorage.setItem('botDark',on?'1':'0');
}

function applyNameLogin(name){
  document.getElementById('bot-name-lbl').textContent=name;
  document.title=name;
  localStorage.setItem('botName',name);
  document.querySelectorAll('.nm-swatch').forEach(b=>b.classList.toggle('active',b.dataset.name===name));
}

const menu=document.getElementById('palette-menu');
const logo=document.getElementById('logo-trigger');
logo.addEventListener('click',e=>{e.stopPropagation();menu.classList.toggle('visible');});
document.addEventListener('click',e=>{if(!menu.contains(e.target)&&!logo.contains(e.target))menu.classList.remove('visible');});
document.querySelectorAll('.pm-swatch').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();applyPaletteLogin(el.dataset.palette);setTimeout(()=>menu.classList.remove('visible'),200);}));
document.querySelectorAll('.nm-swatch').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();applyNameLogin(el.dataset.name);setTimeout(()=>menu.classList.remove('visible'),200);}));

applyDark(localStorage.getItem('botDark')==='1');
applyPaletteLogin(localStorage.getItem('botPalette')||'giallo_grafite');
applyNameLogin('Ross');
document.getElementById('dm-row').addEventListener('click',function(e){e.stopPropagation();applyDark(!document.body.classList.contains('dark'));});
